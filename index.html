<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFP Generator — Upload</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #222; }
h2 { color: #d32f2f; }
label { display: block; font-weight: 600; margin: 16px 0 4px; }
input[type=file] { display: block; width: 100%; padding: 6px; }
.file-status { font-size: 13px; margin-top: 2px; min-height: 20px; }
.file-status.done { color: #2e7d32; font-weight: 600; }
.file-status.error { color: #c62828; }
button { display: block; width: 100%; padding: 12px; font-size: 16px; font-weight: 600; color: #fff; background: #d32f2f; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px; }
button:disabled { background: #ccc; cursor: default; }
#status { margin-top: 16px; padding: 10px; background: #f5f5f5; border-radius: 4px; font-size: 13px; min-height: 20px; }
#status.error { background: #ffebee; color: #c62828; }
</style>
</head>
<body>
<h2>Central Lab RFP Generator</h2>
<p style="color:#666;font-size:14px">Upload PDFs — each is parsed immediately. Then click Next to generate.</p>

<label for="f-protocol">Protocol PDF</label>
<input type="file" id="f-protocol" accept="application/pdf">
<div class="file-status" id="s-protocol"></div>

<label for="f-design">Design-elements PDF</label>
<input type="file" id="f-design" accept="application/pdf">
<div class="file-status" id="s-design"></div>

<label for="f-prev">Previous RFP PDF</label>
<input type="file" id="f-prev" accept="application/pdf">
<div class="file-status" id="s-prev"></div>

<label for="f-template">Blank template .docx <span style="color:#d32f2f">(required)</span></label>
<input type="file" id="f-template" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
<div class="file-status" id="s-template"></div>

<div id="status">Upload a template .docx to continue.</div>
<button id="btn-next" disabled>Next: Generate RFP →</button>

<script type="module">
// ── Original working liteparse pattern (identical to initial working version) ──
const BASE = new URL('.', location.href).href.replace(/\/$/, '');
const STORAGE_KEY = 'rfp-gen-data';

let LiteParse = null;
let liteparseInited = false;

async function initLiteparse() {
  if (liteparseInited) return;
  try {
    const mod = await import(`${BASE}/liteparse/liteparse_wasm.js`);
    await mod.default(`${BASE}/liteparse/liteparse_wasm_bg.wasm`);
    LiteParse = mod.LiteParse;
    liteparseInited = true;
  } catch (err) {
    document.getElementById('status').textContent = 'ERROR loading PDF parser: ' + (err.message || err);
    document.getElementById('status').className = 'error';
    throw err;
  }
}

async function parsePDF(file) {
  await initLiteparse();
  const parser = new LiteParse({ outputFormat: 'markdown', ocrEnabled: false });
  const bytes = new Uint8Array(await file.arrayBuffer());
  const result = await parser.parse(bytes);
  const pages = result.pages.map(p => ({
    page: p.pageNumber, width: p.width, height: p.height,
    text: p.items.map(i => i.text).join(' '),
    textItems: p.items.map(i => ({
      text: i.text, x: i.bbox[0], y: i.bbox[1],
      width: i.bbox[2] - i.bbox[0], height: i.bbox[3] - i.bbox[1],
    })),
  }));
  return result.text + '\n' + JSON.stringify({ pages }, null, 2);
}

// ── State ──
const parsed = {};
let templateData = null;
let templateName = '';

const statuses = {
  'f-protocol': document.getElementById('s-protocol'),
  'f-design': document.getElementById('s-design'),
  'f-prev': document.getElementById('s-prev'),
  'f-template': document.getElementById('s-template'),
};

['f-protocol','f-design','f-prev','f-template'].forEach(id => {
  const inp = document.getElementById(id);
  inp.addEventListener('change', async () => {
    const file = inp.files[0];
    if (!file) return;
    
    if (id === 'f-template') {
      templateData = await file.arrayBuffer();
      templateName = file.name;
      statuses[id].textContent = '\u2713 Ready';
      statuses[id].className = 'file-status done';
      document.getElementById('btn-next').disabled = false;
      document.getElementById('status').textContent = 'Template loaded. You can also add PDFs above.';
      return;
    }
    
    statuses[id].textContent = '\u23f3 Parsing\u2026';
    statuses[id].className = 'file-status';
    try {
      parsed[id] = await parsePDF(file);
      statuses[id].textContent = '\u2713 Parsed (' + parsed[id].length + ' chars)';
      statuses[id].className = 'file-status done';
    } catch (err) {
      statuses[id].textContent = '\u2717 ' + (err.message || err);
      statuses[id].className = 'file-status error';
    }
  });
});

document.getElementById('btn-next').addEventListener('click', () => {
  const data = { parsed, templateBase64: btoa(String.fromCharCode(...new Uint8Array(templateData))), templateName };
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  window.location.href = 'generate.html';
});
</script>
</body>
</html>
