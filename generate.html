<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Step 2: Generate RFP — Central Lab RFP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0; padding: 24px;
      background: #fafafa; min-height: 100vh; color: #212121;
    }
    .card {
      background: #fff; border-radius: 6px;
      box-shadow: 0 1.6px 3.6px rgba(0,0,0,.1), 0 .3px .9px rgba(0,0,0,.08);
      padding: 32px; max-width: 640px; margin: 0 auto;
    }
    .steps {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .step {
      flex: 1; text-align: center; padding: 8px; border-radius: 4px;
      font-size: 13px; font-weight: 600;
    }
    .step.done { background: #2e7d32; color: #fff; }
    .step.active { background: #d32f2f; color: #fff; }
    .step.inactive { background: #e0e0e0; color: #9e9e9e; }
    h2 { margin: 0 0 4px; font-size: 22px; color: #d32f2f; }
    .subtitle { color: #616161; font-size: 13px; margin: 0 0 20px; }

    .file-summary {
      background: #f5f5f5; border-radius: 4px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px;
    }
    .file-summary strong { color: #212121; }
    .file-summary .ok { color: #2e7d32; }
    .file-summary .miss { color: #9e9e9e; }

    .check-row { display: flex; align-items: center; gap: 8px; margin: 7px 0; font-size: 14px; }
    .check-row input[type=checkbox] { width: 16px; height: 16px; accent-color: #d32f2f; cursor: pointer; }

    button {
      display: block; width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
      color: #fff; background: #d32f2f; border: none; border-radius: 4px;
      cursor: pointer; transition: background .15s;
    }
    button:hover:not(:disabled) { background: #b71c1c; }
    button:disabled { background: #e0e0e0; color: #9e9e9e; cursor: not-allowed; }
    .btn-secondary {
      background: #fff; color: #212121; border: 1px solid #bdbdbd;
    }
    .btn-secondary:hover:not(:disabled) { background: #f5f5f5; }

    .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 12px; overflow: hidden; }
    .progress-fill { height: 100%; background: #d32f2f; width: 0%; transition: width .4s ease; }

    #status {
      margin-top: 14px; padding: 12px 14px; border-radius: 4px;
      font-size: 13px; line-height: 1.5; white-space: pre-wrap;
      background: #f5f5f5; color: #212121; min-height: 42px;
      border-left: 3px solid #e0e0e0;
    }
    #status.info { border-left-color: #d32f2f; }
    #status.error { background: #ffebee; color: #c62828; border-left-color: #d32f2f; }
    #status.done  { background: #e8f5e9; color: #2e7d32; border-left-color: #43a047; }

    .footer { text-align: center; font-size: 11px; color: #bdbdbd; margin-top: 24px; }

    /* Review panel */
    #review-panel { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e0e0e0; }
    .review-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 12px; }
    .review-table th { text-align: left; padding: 6px 8px; border-bottom: 2px solid #e0e0e0; font-weight: 600; color: #616161; font-size: 11px; text-transform: uppercase; }
    .review-table td { padding: 8px; border-bottom: 1px solid #f5f5f5; }
    .review-table .field-name { font-weight: 600; width: 35%; }
    .action-buttons { display: flex; gap: 10px; margin-top: 14px; }
    .action-buttons button { width: auto; flex: 1; }
  </style>
</head>
<body>
<div class="card">
  <div class="steps">
    <div class="step done">1. Upload & Parse ✓</div>
    <div class="step active">2. Generate RFP</div>
  </div>
  <h2>Generate RFP</h2>
  <p class="subtitle">Review your files, set options, and generate the RFP document.</p>

  <div class="file-summary" id="file-summary">Loading parsed data…</div>

  <fieldset>
    <legend>Does this study involve…</legend>
    <div class="check-row"><input type="checkbox" id="cb-dec" /><label for="cb-dec">Decentralized trials</label></div>
    <div class="check-row"><input type="checkbox" id="cb-pi"  /><label for="cb-pi">Penalties &amp; Incentives</label></div>
    <div class="check-row"><input type="checkbox" id="cb-ap"  /><label for="cb-ap">Anatomic Pathology / Histology</label></div>
  </fieldset>

  <button id="btn-generate">Generate RFP</button>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div id="status" class="info">Click Generate to start.</div>

  <!-- Results section (shown after generation) -->
  <div id="review-panel">
    <div id="review-fields"></div>
    <div class="action-buttons">
      <button id="btn-download" class="btn-secondary">⬇ Download RFP</button>
    </div>
  </div>

  <div class="footer">Eli Lilly and Company · Clinical Laboratory Sciences · For internal use only</div>
</div>

<script type="module">
/* ── Step 2: Generate RFP using Pyodide (in Web Worker) ── */
const BASE = new URL('.', location.href).href.replace(/\/$/, '');
const STORAGE_KEY = 'rfp-gen-data';
const btnGen = document.getElementById('btn-generate');
const btnDl  = document.getElementById('btn-download');
const statusEl = document.getElementById('status');
const progressEl = document.getElementById('progress');
const reviewPanel = document.getElementById('review-panel');
const reviewFields = document.getElementById('review-fields');
const summaryEl = document.getElementById('file-summary');

function setStatus(msg, cls = '') {
  statusEl.textContent = msg; statusEl.className = cls;
}
function setProgress(pct) {
  progressEl.style.width = pct + '%';
}

// ── Load parsed data from sessionStorage ──
let genData;
try {
  const raw = sessionStorage.getItem(STORAGE_KEY);
  if (!raw) throw new Error('No parsed data found — go back to Step 1.');
  genData = JSON.parse(raw);
} catch (e) {
  summaryEl.innerHTML = '<strong>Error:</strong> ' + e.message + '<br><a href="index.html" style="color:#d32f2f">← Back to Step 1</a>';
  btnGen.disabled = true;
}

// Show summary
if (genData) {
  const files = [
    ['Protocol PDF', genData.parsed['f-protocol']],
    ['Design Elements', genData.parsed['f-design']],
    ['Previous RFP', genData.parsed['f-prev']],
    ['Template', genData.templateName],
  ];
  summaryEl.innerHTML = files.map(([name, val]) =>
    `<div>${val ? '<span class="ok">✓</span>' : '<span class="miss">—</span>'} <strong>${name}</strong>: ${val ? (name === 'Template' ? val : 'parsed') : 'not provided'}</div>`
  ).join('');
}

// ── Web Worker for Pyodide ──
const worker = new Worker(`${BASE}/worker.js`, { type: 'module' });
let _callId = 0;
const _callbacks = new Map();

worker.onmessage = (e) => {
  const { id, result, error, type, msg, pct } = e.data;
  if (type === 'progress') {
    setProgress(pct || 0);
    if (msg) setStatus(msg, 'info');
    return;
  }
  const cb = _callbacks.get(id);
  if (!cb) return;
  _callbacks.delete(id);
  if (error) cb.reject(new Error(error));
  else cb.resolve(result);
};

function callWorker(cmd, args = {}, timeoutMs = 300000) {
  return new Promise((resolve, reject) => {
    const id = ++_callId;
    const timer = setTimeout(() => {
      _callbacks.delete(id);
      reject(new Error('Timeout (' + cmd + ')'));
    }, timeoutMs);
    _callbacks.set(id, {
      resolve: (v) => { clearTimeout(timer); resolve(v); },
      reject: (e) => { clearTimeout(timer); reject(e); }
    });
    worker.postMessage({ id, cmd, args });
  });
}

// ── Generate ──
let genState = { docxBytes: null, fileName: null };

btnGen.addEventListener('click', async () => {
  if (!genData) return;

  const answers = {
    decentralized:       document.getElementById('cb-dec').checked,
    penalties_incentives: document.getElementById('cb-pi').checked,
    anatomic_pathology:  document.getElementById('cb-ap').checked,
  };

  btnGen.disabled = true;
  setProgress(0);
  reviewPanel.style.display = 'none';

  try {
    setStatus('Loading Python runtime (first run ~30 s)…', 'info'); setProgress(5);
    await callWorker('bootPyodide');
    setProgress(30);

    setStatus('Writing files…', 'info'); setProgress(35);
    const protocolMd = genData.parsed['f-protocol'] || '';
    const designMd   = genData.parsed['f-design'] || '';
    const prevMd     = genData.parsed['f-prev'] || '';

    // Decode template from base64
    const templateStr = atob(genData.templateBase64);
    const templateBytes = new Uint8Array(templateStr.length);
    for (let i = 0; i < templateStr.length; i++) templateBytes[i] = templateStr.charCodeAt(i);

    await callWorker('mkdir', { path: '/io/in' });
    await callWorker('mkdir', { path: '/io/out' });
    await callWorker('writeFile', { path: '/io/in/protocol.md', data: protocolMd });
    await callWorker('writeFile', { path: '/io/in/design.md', data: designMd });
    await callWorker('writeFile', { path: '/io/in/previous_rfp.md', data: prevMd });
    await callWorker('writeFile', { path: '/io/in/template.docx', data: templateBytes });
    setProgress(45);

    setStatus('Generating RFP…', 'info'); setProgress(50);
    await callWorker('runPython', { code: `
import os, importlib, json
os.environ.update({
  "RFP_INPUT_DIR":  "/io/in",
  "RFP_OUTPUT_DIR": "/io/out",
  "RFP_PROTOCOL":   "/io/in/protocol.md",
  "RFP_DESIGN":     "/io/in/design.md",
  "RFP_PREV":       "/io/in/previous_rfp.md",
  "RFP_TEMPLATE":   "/io/in/template.docx",
  "RFP_OUTDOC":     "/io/out/RFP.docx",
  "RFP_REPORT":     "/io/out/report.md",
  "RFP_ANSWERS":    ${JSON.stringify(JSON.stringify(answers))},
})
import populate_rfp
importlib.reload(populate_rfp)
` });
    setProgress(85);

    const docxBytes = await callWorker('readFile', { path: '/io/out/RFP.docx' });
    const reportBytes = await callWorker('readFile', { path: '/io/out/report.md' });
    const docx   = new Uint8Array(docxBytes);
    const report = new TextDecoder().decode(reportBytes);
    const name   = 'Central_Laboratory_RFP_' + new Date().toISOString().slice(0, 10) + '.docx';

    genState.docxBytes = docx;
    genState.fileName  = name;

    setProgress(100);
    const filled   = (report.match(/\| filled/g)   || []).length;
    const computed = (report.match(/\| computed/g) || []).length;
    const review   = (report.match(/\| review/g)   || []).length;
    setStatus(
      '✅ Done — ready to download.\nCoverage: ' + filled + ' filled · ' + computed + ' computed · ' + review + ' need review.',
      'done'
    );

    // Show review fields
    if (review > 0) {
      const lines = report.split('\n').filter(l => l.includes('| review |'));
      reviewFields.innerHTML = '<strong>⚑ Fields needing review:</strong><br><br>' +
        lines.map(l => {
          const parts = l.split('|').map(s => s.trim());
          return '• <strong>' + (parts[1] || '') + '</strong> — ' + (parts[2] || '');
        }).join('<br>');
    } else {
      reviewFields.innerHTML = '<strong>✓ All fields filled.</strong>';
    }

    reviewPanel.style.display = 'block';
    btnDl.textContent = '⬇ Download RFP';

  } catch (err) {
    setStatus('❌ ' + (err?.message || String(err)), 'error');
    setProgress(0);
  } finally {
    btnGen.disabled = false;
  }
});

// ── Download ──
btnDl.addEventListener('click', () => {
  if (!genState.docxBytes) return;
  const blob = new Blob([genState.docxBytes], {
    type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = genState.fileName;
  a.click();
});
</script>
</body>
</html>
